resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name _;

    # Serve static frontend files
    root /usr/share/nginx/html;
    index index.html;

    # ── Auth Service routes ──
    location /api/auth/ {
        set $upstream_auth http://auth-service:3001;
        proxy_pass $upstream_auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/users/ {
        set $upstream_auth http://auth-service:3001;
        proxy_pass $upstream_auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Product Service routes ──
    location /api/products {
        set $upstream_product http://product-service:3002;
        proxy_pass $upstream_product;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/categories {
        set $upstream_product http://product-service:3002;
        proxy_pass $upstream_product;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Order Service routes ──
    location /api/orders {
        set $upstream_order http://order-service:3003;
        proxy_pass $upstream_order;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Health check proxies ──
    location = /health/auth {
        set $upstream_auth http://auth-service:3001;
        proxy_pass $upstream_auth/api/health;
    }

    location = /health/product {
        set $upstream_product http://product-service:3002;
        proxy_pass $upstream_product/api/health;
    }

    location = /health/order {
        set $upstream_order http://order-service:3003;
        proxy_pass $upstream_order/api/health;
    }

    location = /health/notification {
        set $upstream_notification http://notification-worker:3004;
        proxy_pass $upstream_notification/api/health;
    }

    # ── Frontend (fallback) ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
