server {
    listen 80;
    server_name _;

    # Serve static frontend files
    root /usr/share/nginx/html;
    index index.html;

    # ── Auth Service routes ──
    location /api/auth/ {
        proxy_pass http://auth-service:3001/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/users/ {
        proxy_pass http://auth-service:3001/api/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Product Service routes ──
    location /api/products/ {
        proxy_pass http://product-service:3002/api/products/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/products {
        proxy_pass http://product-service:3002/api/products;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/categories {
        proxy_pass http://product-service:3002/api/categories;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Order Service routes ──
    location /api/orders/ {
        proxy_pass http://order-service:3003/api/orders/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/orders {
        proxy_pass http://order-service:3003/api/orders;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Health check proxies (each service has its own path) ──
    location = /health/auth {
        proxy_pass http://auth-service:3001/api/health;
    }

    location = /health/product {
        proxy_pass http://product-service:3002/api/health;
    }

    location = /health/order {
        proxy_pass http://order-service:3003/api/health;
    }

    location = /health/notification {
        proxy_pass http://notification-worker:3004/api/health;
    }

    # ── Frontend (fallback) ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
